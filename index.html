<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My First Azure Webpage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f6f9;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #0078d4; /* Azure blue */
    }
    p {
      font-size: 18px;
      color: #333;
    }
    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #0078d4;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    .button:hover {
      background-color: #005a9e;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Azure Webpage!</h1>
  <p>This page is hosted for free using Azure Static Web Apps.</p>
  <a href="https://azure.microsoft.com" class="button">Learn More</a>
</body>
</html>
